background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 72
    font_family = MesloLGM Nerd Font
    color = rgba(255, 255, 255, 0.9)
    position = 0, 120
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    position = 0, 0
    halign = center
    valign = center
    placeholder_text = password:
    font_family = MesloLGM Nerd Font
    inner_color = rgba(0, 0, 0, 0.5)
    outer_color = rgba(255, 255, 255, 0.3)
    font_color = rgba(255, 255, 255, 0.9)
    check_color = rgba(0, 255, 150, 0.8)
    fail_color = rgba(255, 80, 80, 0.8)
    rounding = 10
}
